name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Rebuild PyInstaller bootloader from source
        run: |
          git clone --depth 1 https://github.com/pyinstaller/pyinstaller.git _pyinstaller
          cd _pyinstaller\bootloader
          python waf all
          pip install ..

      - name: Build executable
        run: pyinstaller matterkeep.spec

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/matterkeep.exe

  build-macos:
    name: Build macOS executable
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build executable
        run: pyinstaller matterkeep.spec

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/matterkeep
